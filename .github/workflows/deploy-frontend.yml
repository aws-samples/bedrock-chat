name: Deploy Frontend

on:
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy to S3
        run: |
          BUCKET_NAME="bedrockchatstack-frontendassetbucket3fa96e62-70whidyfufzg"
          echo "Deploying to bucket: $BUCKET_NAME"
          cd frontend
          aws s3 sync ./dist/ s3://$BUCKET_NAME/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTIONS=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Origins.Items[0].DomainName, 'bedrockchatstack-frontendassetbucket3fa96e62-70whidyfufzg')].Id" --output text)
          
          if [ -n "$DISTRIBUTIONS" ]; then
            DISTRIBUTION_ID=$(echo $DISTRIBUTIONS | awk '{print $1}')
            echo "Found CloudFront distribution: $DISTRIBUTION_ID"
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          else
            echo "No CloudFront distribution found for the bucket, skipping invalidation"
          fi
name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm stack deletion'
        required: true
        default: ''
      force:
        description: 'Force destroy resources using AWS CLI if CDK destroy fails'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Find package.json
        id: find-package
        run: |
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PACKAGE_JSON_PATH" ]; then
            echo "No package.json found in the repository"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PACKAGE_JSON_PATH")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found package.json in $PROJECT_DIR"

      - name: Install Node dependencies
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: npm install

      - name: Pre-clean CloudFront invalidations
        run: |
          echo "Checking for CloudFront distributions..."
          CF_DISTRIBUTIONS=$(aws cloudfront list-distributions --query "DistributionList.Items[*].Id" --output text)
          if [ -n "$CF_DISTRIBUTIONS" ]; then
            for DIST_ID in $CF_DISTRIBUTIONS; do
              echo "Checking invalidations for distribution $DIST_ID"
              INVALIDATIONS=$(aws cloudfront list-invalidations --distribution-id $DIST_ID --query "InvalidationList.Items[?Status=='InProgress'].Id" --output text)
              if [ -n "$INVALIDATIONS" ]; then
                echo "Found in-progress invalidations for $DIST_ID, will continue anyway"
              fi
            done
          else
            echo "No CloudFront distributions found"
          fi

      - name: Attempt CDK destroy
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        id: cdk-destroy
        continue-on-error: true
        run: npx cdk destroy --all --force

      - name: Force cleanup if CDK destroy failed
        if: steps.cdk-destroy.outcome == 'failure' && github.event.inputs.force == true
        run: |
          echo "CDK destroy failed, attempting manual cleanup of resources..."

          # Get stack name
          STACK_NAME=$(aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE ROLLBACK_COMPLETE DELETE_FAILED --query "StackSummaries[?contains(StackName, 'BedrockChat')].StackName" --output text)

          if [ -z "$STACK_NAME" ]; then
            echo "No BedrockChat stack found"
            exit 0
          fi

          echo "Found stack: $STACK_NAME"

          # Disable termination protection
          echo "Disabling termination protection if enabled..."
          aws cloudformation update-termination-protection --stack-name "$STACK_NAME" --no-enable-termination-protection || true

          # Clean OSIS pipelines
          echo "Checking for OSIS pipelines..."
          OSIS_PIPELINES=$(aws osis list-pipelines --query "Pipelines[*].PipelineName" --output text)
          if [ -n "$OSIS_PIPELINES" ]; then
            for PIPELINE in $OSIS_PIPELINES; do
              echo "Deleting OSIS pipeline: $PIPELINE"
              aws osis delete-pipeline --pipeline-name "$PIPELINE" || true
            done
          else
            echo "No OSIS pipelines found"
          fi

          # Clean S3 buckets
          BUCKETS=$(aws cloudformation describe-stack-resources --stack-name $STACK_NAME --query "StackResources[?ResourceType=='AWS::S3::Bucket'].PhysicalResourceId" --output text)
          if [ -n "$BUCKETS" ]; then
            for BUCKET in $BUCKETS; do
              echo "Emptying bucket: $BUCKET"
              aws s3 rm s3://$BUCKET --recursive || true
            done
          fi

          # Clean CloudWatch log groups
          LOG_GROUPS=$(aws logs describe-log-groups --query "logGroups[?starts_with(logGroupName, '/aws/lambda/BedrockChat')].logGroupName" --output text)
          if [ -n "$LOG_GROUPS" ]; then
            for LOG in $LOG_GROUPS; do
              echo "Deleting log group: $LOG"
              aws logs delete-log-group --log-group-name "$LOG" || true
            done
          fi

          # Attempt final stack delete
          echo "Attempting to delete stack..."
          aws cloudformation delete-stack --stack-name "$STACK_NAME" || true
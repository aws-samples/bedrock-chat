name: Deploy CDK Project

on:
  workflow_dispatch:

jobs:
  aws_cdk:
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache CDK context and dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            cdk/cdk.context.json
          key: ${{ runner.os }}-cdk-${{ hashFiles('cdk/package-lock.json') }}

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm install

      - name: Set up Docker Buildx
        if: always()
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker access
        run: docker ps
        continue-on-error: true

      - name: Install Poetry
        run: pip install poetry

      - name: Generate requirements.txt for Lambda bundling
        working-directory: backend/auth/add_user_to_groups
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Debug Lambda bundling directory
        run: |
          echo "::group::Contents of Lambda source directory"
          ls -lah backend/auth/add_user_to_groups || echo "Directory not found"
          cat backend/auth/add_user_to_groups/requirements.txt || echo "requirements.txt missing"
          echo "::endgroup::"

      - name: CDK diff
        uses: youyo/aws-cdk-github-actions@v2
        with:
          cdk_subcommand: 'diff'
          working_dir: 'cdk'
          actions_comment: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: CDK deploy
        uses: youyo/aws-cdk-github-actions@v2
        with:
          cdk_subcommand: 'deploy'
          cdk_stack: '*'
          cdk_args: '--require-approval never'
          working_dir: 'cdk'
          actions_comment: false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  ```
  
  This ensures Poetry is installed and the `requirements.txt` is generated in the correct directory before the CDK steps.
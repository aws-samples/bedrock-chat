name: Deploy

on:
  workflow_dispatch:  # Enables manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Removed cache: 'npm' since no lock file exists

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-2"

      - name: Install Node dependencies
        run: npm ci || npm install
        # Added fallback to npm install in case npm ci fails without lock file

      - name: Optional Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            echo "Installing Python dependencies..."
            python3 -m pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping Python deps."
          fi

      - name: Optional TypeScript build
        run: |
          if [ -f tsconfig.json ]; then
            echo "Compiling TypeScript..."
            npx tsc
          else
            echo "No tsconfig.json found, skipping TypeScript build."
          fi

      - name: CDK Bootstrap
        run: npx cdk bootstrap

      - name: Deploy CDK stack
        run: npx cdk deploy --require-approval never
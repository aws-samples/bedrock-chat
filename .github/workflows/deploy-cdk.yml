name: Deploy & Update CDK Stacks

on:
  workflow_dispatch:  # Enables manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Find package.json
        id: find-package
        run: |
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PACKAGE_JSON_PATH" ]; then
            echo "No package.json found in the repository"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PACKAGE_JSON_PATH")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found package.json in $PROJECT_DIR"

      - name: Install Node dependencies
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: npm install

      - name: Optional Python dependencies
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: |
          if [ -f requirements.txt ]; then
            echo "Installing Python dependencies..."
            python3 -m pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping Python deps."
          fi

      - name: Optional TypeScript build
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: |
          if [ -f tsconfig.json ]; then
            echo "Compiling TypeScript..."
            npx tsc
          else
            echo "No tsconfig.json found, skipping TypeScript build."
          fi

      - name: Clean up DELETE_FAILED stacks
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: |
          STACKS=$(aws cloudformation list-stacks --stack-status-filter DELETE_FAILED --query 'StackSummaries[*].StackName' --output text)
          if [[ -n "$STACKS" ]]; then
            echo "Found stacks in DELETE_FAILED state: $STACKS"
            for STACK in $STACKS; do
              echo "Processing $STACK stack..."

              # Get resources in DELETE_FAILED state
              FAILED_RESOURCES=$(aws cloudformation list-stack-resources --stack-name $STACK --query 'StackResourceSummaries[?ResourceStatus==`DELETE_FAILED`].LogicalResourceId' --output text)

              if [[ -n "$FAILED_RESOURCES" ]]; then
                echo "Found resources in DELETE_FAILED state: $FAILED_RESOURCES"

                # Try to skip those resources during deletion
                echo "Attempting to clean up stack with retain option..."
                aws cloudformation delete-stack --stack-name $STACK --retain-resources $FAILED_RESOURCES
                aws cloudformation wait stack-delete-complete --stack-name $STACK || true
              else
                # Try normal deletion if no specific resources are in DELETE_FAILED state
                echo "No specific resources found in DELETE_FAILED state, attempting normal deletion..."
                aws cloudformation delete-stack --stack-name $STACK
                aws cloudformation wait stack-delete-complete --stack-name $STACK || true
              fi

              # If stack still exists, try to remove it from CloudFormation's tracking
              if aws cloudformation describe-stacks --stack-name $STACK 2>/dev/null; then
                echo "Stack still exists, attempting to remove from CloudFormation tracking..."
                aws cloudformation continue-update-rollback --stack-name $STACK --skip-resources-not-in-stack || true
              else
                echo "Stack $STACK successfully removed."
              fi
            done
          else
            echo "No stacks in DELETE_FAILED state found"
          fi

      - name: CDK Bootstrap
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: npx cdk bootstrap

      - name: Deploy CDK stack
        working-directory: ${{ steps.find-package.outputs.project_dir }}
        run: npx cdk deploy --all --require-approval never
name: Deploy

on:
  workflow_dispatch:  # Enables manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK and Node dependencies
        run: |
          npm install -g aws-cdk
          npm ci

      - name: Optional Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            echo "Installing Python dependencies..."
            python3 -m pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping Python deps."
          fi

      - name: Optional TypeScript build
        run: |
          if [ -f tsconfig.json ]; then
            echo "Compiling TypeScript..."
            npx tsc
          else
            echo "No tsconfig.json found, skipping TypeScript build."
          fi

      - name: Deploy CDK stack
        run: cdk deploy --require-approval never